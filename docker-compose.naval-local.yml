version: "3.9"
services:
  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      - DB=sqlite
      - DB_FILENAME=/etc/temporal/temporal.db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
      - "8233:8233"

  localstack:
    image: localstack/localstack:3.0
    environment:
      - SERVICES=s3,sqs,dynamodb,sts
      - DEBUG=0
      - AWS_DEFAULT_REGION=ap-northeast-1
    ports:
      - "4566:4566"

  naval-gui:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install --quiet -r requirements.txt && python -m naval gui --host 0.0.0.0 --no-browser"
    env_file:
      - .env.naval-local
    ports:
      - "8800:8800"
